services:
  - type: web
    name: foodlog-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: SPOONACULAR_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
